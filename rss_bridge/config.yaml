name: "RSS Bridge"
slug: "rss_bridge"
description: "RSS-Bridge for Home Assistant with ingress access for humans and direct local HTTP for integrations like Feedreader."
version: "0.1.3"
url: "https://github.com/Sanher/sanher-ha-addons/tree/main/rss_bridge"
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
ingress: true
ingress_port: 8099
panel_title: "RSS Bridge"
panel_icon: "mdi:rss-box"
watchdog: "http://[HOST]:[PORT:8099]/"

map:
  - data:rw

ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: RSS-Bridge direct local HTTP for integrations like Feedreader

options:
  auth_token: ""
  debug: false
  timezone: "UTC"

schema:
  auth_token: password?
  debug: bool
  timezone: str
