name: "17Track App"
slug: "17track_app"
description: "Servidor 17Track (Node) para paquetes + background refresher + worker IMAP"
version: "2.1.1"
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8787
panel_title: Paquetes IMAP
panel_icon: mdi:package-variant-closed

ports:
  8787/tcp: 8787

map:
  - data:rw
  - config:rw

options:
  app_api_key: ""
  app_json_limit: "256kb"

  bg_enabled: true
  bg_interval_min: 15
  bg_normal_interval_min: 45
  bg_slow_hours: "8,20"

  ha_url: "http://supervisor/core"
  ha_token: ""
  ha_script: "jarvis_17track_notify"

  imap_accounts_file: "/config/imap_accounts.json"
  imap_worker_lookback_days: 60

  imap_gmail_1_app_password: ""
  imap_gmail_2_app_password: ""
  imap_gmail_3_app_password: ""
  imap_gmail_4_app_password: ""
  imap_gmail_filter_app_password: ""
  imap_outlook_app_password: ""

  outlook_imap_client_id: ""
  outlook_imap_client_secret: ""
  outlook_imap_refresh_token: ""

schema:
  app_api_key: str?
  app_json_limit: str?

  bg_enabled: bool
  bg_interval_min: int
  bg_normal_interval_min: int
  bg_slow_hours: str

  ha_url: str
  ha_token: str
  ha_script: str

  imap_accounts_file: str?
  imap_worker_lookback_days: int?

  imap_gmail_1_app_password: password?
  imap_gmail_2_app_password: password?
  imap_gmail_3_app_password: password?
  imap_gmail_4_app_password: password?
  imap_gmail_filter_app_password: password?
  imap_outlook_app_password: password?

  outlook_imap_client_id: str?
  outlook_imap_client_secret: password?
  outlook_imap_refresh_token: password?
