name: "17Track App"
slug: "17track_app"
description: "Servidor 17Track (Node) para paquetes + background refresher + worker IMAP"
version: "2.1.0rc"
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8787
panel_title: Paquetes IMAP
panel_icon: mdi:package-variant-closed

ports:
  8787/tcp: 8787

map:
  - data:rw
  - config:rw

options:
  track17_token: ""
  port: 8787
  app_log_level: "info"
  app_api_key: ""
  app_json_limit: "256kb"

  bg_enabled: true
  bg_interval_min: 15
  bg_normal_interval_min: 45
  bg_slow_hours: "8,20"
  bg_delay_ms: 5000
  carriers_17track_cache_ttl_ms: 86400000
  carriers_17track_fetch_timeout_ms: 12000

  ha_url: "http://supervisor/core"
  ha_token: ""
  ha_script: "jarvis_17track_notify"
  ha_audit_log_enabled: false
  ha_audit_log_level: "warn"
  ha_audit_log_name: "Paquetes App"
  ha_audit_log_entity_id: ""

  imap_enabled: true
  imap_accounts_file: "/config/imap_accounts.json"
  imap_worker_interval_min: 10
  imap_worker_lookback_days: 60
  imap_worker_fetch_limit: 120
  imap_ingest_batch_size: 100
  imap_ingest_timeout_sec: 20
  imap_worker_dry_run: false
  imap_default_owner: ""

  imap_gmail_1_app_password: ""
  imap_gmail_2_app_password: ""
  imap_gmail_3_app_password: ""
  imap_gmail_4_app_password: ""
  imap_gmail_filter_app_password: ""
  imap_outlook_app_password: ""

  outlook_imap_client_id: ""
  outlook_imap_client_secret: ""
  outlook_imap_refresh_token: ""

schema:
  track17_token: str
  port: int
  app_log_level: list(debug|info|warn|error)?
  app_api_key: str?
  app_json_limit: str?

  bg_enabled: bool
  bg_interval_min: int
  bg_normal_interval_min: int
  bg_slow_hours: str
  bg_delay_ms: int
  carriers_17track_cache_ttl_ms: int?
  carriers_17track_fetch_timeout_ms: int?

  ha_url: str
  ha_token: str
  ha_script: str
  ha_audit_log_enabled: bool?
  ha_audit_log_level: list(debug|info|warn|error)?
  ha_audit_log_name: str?
  ha_audit_log_entity_id: str?

  imap_enabled: bool?
  imap_accounts_file: str?
  imap_worker_interval_min: int?
  imap_worker_lookback_days: int?
  imap_worker_fetch_limit: int?
  imap_ingest_batch_size: int?
  imap_ingest_timeout_sec: int?
  imap_worker_dry_run: bool?
  imap_default_owner: str?

  imap_gmail_1_app_password: password?
  imap_gmail_2_app_password: password?
  imap_gmail_3_app_password: password?
  imap_gmail_4_app_password: password?
  imap_gmail_filter_app_password: password?
  imap_outlook_app_password: password?

  outlook_imap_client_id: str?
  outlook_imap_client_secret: password?
  outlook_imap_refresh_token: password?
