name: Happy Server
version: "0.1.4"
slug: happy_server
description: Self-hosted Happy Server para Home Assistant con PostgreSQL y Redis internos
url: "https://github.com/Sanher/sanher-ha-addons/tree/main/happy_server"
arch:
  - amd64
  - aarch64
  - armv7
startup: services
boot: auto
host_network: false
webui: http://[HOST]:[PORT:3005]
watchdog: http://[HOST]:[PORT:3005]/health

map:
  - data:rw

ports:
  3005/tcp: 3005
ports_description:
  3005/tcp: Happy Server HTTP y WebSocket

options:
  public_url: "http://homeassistant.local:3005"
  seed: ""

schema:
  public_url: str
  seed: password?
