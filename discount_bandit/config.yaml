name: "Discount Bandit"
slug: "discount_bandit"
description: "Self-hosted Discount Bandit with persistent SQLite and APP_KEY in /data."
version: "0.0.2"
url: "https://github.com/Sanher/sanher-ha-addons/tree/main/discount_bandit"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
ingress: false
webui: "http://[HOST]:[PORT:80]"

map:
  - data:rw

ports:
  80/tcp: 8099

ports_description:
  80/tcp: "Discount Bandit web UI"

options:
  public_base_url: "http://homeassistant.local:8099"
  theme_color: "Red"
  cron: "*/5 * * * *"
  exchange_rate_api_key: ""

schema:
  public_base_url: str
  theme_color: str
  cron: str
  exchange_rate_api_key: password?
