name: "Discount Bandit"
slug: "discount_bandit"
description: "Self-hosted Discount Bandit with ingress-first access, persistent SQLite, and APP_KEY in /data."
version: "0.1.9"
url: "https://github.com/Sanher/sanher-ha-addons/tree/main/discount_bandit"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
ingress: true
ingress_port: 8099
ingress_panel: true
panel_title: "Discount Bandit"
panel_icon: "mdi:cart"
watchdog: "http://[HOST]:[PORT:8099]/health"

map:
  - data:rw

options:
  public_base_url: ""
  theme_color: "Red"
  cron: "*/5 * * * *"
  exchange_rate_api_key: ""

schema:
  public_base_url: str?
  theme_color: str
  cron: str
  exchange_rate_api_key: password?
