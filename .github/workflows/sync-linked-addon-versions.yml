name: Sync linked addon versions

on:
  schedule:
    - cron: "13 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types:
      - child-tag-published

concurrency:
  group: sync-linked-addon-versions
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-versions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync versions from linked repositories
        id: sync
        env:
          SYNC_TARGET_REPO: ${{ github.event.client_payload.repo }}
          SYNC_TARGET_TAG: ${{ github.event.client_payload.tag }}
          SYNC_TARGET_SHA: ${{ github.event.client_payload.sha }}
          SYNC_TARGET_COMMIT_MESSAGE: ${{ github.event.client_payload.commit_message }}
        run: .github/scripts/sync_linked_versions.py

      - name: Commit and push changes
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "${{ steps.sync.outputs.commit_message }}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
