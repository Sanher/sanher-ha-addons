log_format omnitools '$remote_addr - $remote_user [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" "$http_user_agent" '
                     'host="$host" ingress="$http_x_ingress_path" '
                     'forwarded_for="$http_x_forwarded_for"';

server {
  listen 8099;
  listen [::]:8099;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  access_log /dev/stdout omnitools;
  error_log /dev/stderr info;

  allow 172.30.32.2;
  deny all;

  location = /health {
    access_log off;
    default_type text/plain;
    return 200 'ok';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
